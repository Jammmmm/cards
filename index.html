<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="toolbar">
		<button id="new-session">New</button>
        <button id="load-session-btn">Load</button> <input type="file" id="load-session-input" style="display: none;">
        <button id="save-session">Save</button>
        <div class="toolbar-divider"></div>
        <input type="text" id="session-title" placeholder="Title...">
        <button id="add-card">Add Card</button>
        <div class="zoom-controls">
            <button id="zoom-out" title="Zoom Out">−</button>
            <input type="number" id="zoom-display" value="100" min="10" max="300" step="10" title="Zoom Level">
            <button id="zoom-in" title="Zoom In">+</button>
        </div>
        <div class="toolbar-divider"></div>
        <button id="export-json">Export Report</button>
        <button id="save-screenshot">Save Screenshot</button>
        <div class="toolbar-divider"></div>
        <button id="options-btn">Options</button>
        <button id="about-btn">About</button>
    </div>

    <div id="card-container"></div>

    <div id="export-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2>Export Options</h2>

            <label for="report-title">Report Title</label>
            <input type="text" id="report-title" placeholder="e.g., My Brainstorm Session">

            <label>Export Format</label>
            <div id="format-options">
                <label><input type="radio" name="format" value="md"> Markdown (.md)</label>
                <label><input type="radio" name="format" value="html" checked> HTML (.html)</label>
                <label><input type="radio" name="format" value="json"> JSON (.json)</label>
            </div>

            <div class="filter-section">
                <label>Filter by Tags</label>
                <div id="tag-filters" class="filter-container">
                    </div>
            </div>

            <div class="filter-section">
                <label>Filter by Colors</label>
                <div id="color-filters" class="filter-container">
                    </div>
            </div>

            <div class="modal-actions">
                <button id="cancel-export">Cancel</button>
                <button id="confirm-export">Export</button>
            </div>
        </div>
    </div>

    <div id="blurb-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2>Edit Blurb</h2>

            <label for="blurb-textarea">Blurb Text</label>
            <textarea id="blurb-textarea" placeholder="Enter blurb text..."></textarea>

            <div class="modal-actions">
                <button id="cancel-blurb">Cancel</button>
                <button id="confirm-blurb">Save</button>
            </div>
        </div>
    </div>

    <div id="options-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2>Options</h2>

            <label for="default-card-title">Default Card Title</label>
            <input type="text" id="default-card-title" placeholder="New Title">

            <label for="default-card-blurb">Default Card Blurb</label>
            <textarea id="default-card-blurb" placeholder="Click to edit..."></textarea>

            <label>Default Card Color</label>
            <div id="default-color-palette" class="color-palette"></div>

            <label class="checkbox-label">
                <input type="checkbox" id="show-background"> Show grid background
            </label>

            <div class="modal-actions">
                <button id="cancel-options">Cancel</button>
                <button id="confirm-options">Save</button>
            </div>
        </div>
    </div>

    <div id="about-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content about-modal">
            <h2>Cards</h2>
            <p><strong>Version:</strong> 1.1.4</p>
            <p>Virtual index cards for brainstorming</p>
            <p class="about-credit">Based on the <a href="https://github.com/bertjerred/cards" target="_blank" rel="noopener noreferrer">original</a> by <a href="https://github.com/bertjerred/" target="_blank" rel="noopener noreferrer">@bertjerred</a></p>
            <div class="modal-actions">
                <a href="https://github.com/Jammmmm/cards" target="_blank" rel="noopener noreferrer" class="about-github-link">View on GitHub</a>
                <button id="close-about">Close</button>
            </div>
        </div>
    </div>

    <script src="js/lib/html2canvas.min.js"></script>
    <script src="js/model.js"></script>
    <script src="js/ui/cards.js"></script>
    <script src="js/ui/export.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
